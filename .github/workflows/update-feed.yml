name: Nightly Threat Feed Update

on:
  schedule:
    - cron: "0 0 * * *" # Runs every night at midnight UTC
  workflow_dispatch: # Gives you a manual "Run" button in the GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Fetch Script
        run: node generate-feed.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          # Only commit if there are actually new vulnerabilities
          git commit -m "Automated update: Threat feed [skip ci]" || exit 0
          git push
